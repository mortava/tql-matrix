<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>TQL Matrix -- Non-QM Product Intelligence</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='4' fill='%23000000'/><text x='16' y='22' font-family='Inter,sans-serif' font-weight='700' font-size='12' fill='%23FFFFFF' text-anchor='middle'>TQL</text></svg>" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --navy: #0D3B66;
  --navy-hover: #0a2f52;
  --navy-xs: #e8f0fb;
  --bg: #F4F5EE;
  --surface: #FFFFFF;
  --text: #1A1A1A;
  --muted: #6B7280;
  --border: #E5E7EB;
  --gold: #C9A84C;
  --gold-lt: #FDF5E0;
  --green: #166534;
  --green-lt: #DCFCE7;
  --red: #991B1B;
  --red-lt: #FEF2F2;
  --amber: #92400E;
  --amber-lt: #FEF3C7;
  --blue-lt: #EFF6FF;
  --radius: 12px;
  --radius-sm: 8px;
  --radius-lg: 16px;
  --shadow-sm: 0 1px 2px rgba(0,0,0,.04);
  --shadow: 0 1px 3px rgba(0,0,0,.06), 0 1px 2px rgba(0,0,0,.04);
  --shadow-lg: 0 4px 16px rgba(0,0,0,.08);
  --sidebar-w: 260px;
  --topbar-h: 56px;
  --transition: .2s cubic-bezier(.4,0,.2,1);
}

body {
  font-family: 'Inter', system-ui, -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text);
  font-size: 13px;
  line-height: 1.55;
  min-height: 100vh;
  overflow: hidden;
}

/* ======== VAULT ======== */
#vault-screen {
  position: fixed; inset: 0; z-index: 9999;
  background: linear-gradient(145deg, #060e1a 0%, #0a1628 40%, #0D3B66 100%);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  overflow: hidden; perspective: 1200px;
}
#vault-screen.opening { pointer-events: none; }
#vault-screen.gone { display: none !important; }

.vault-particles { position: absolute; inset: 0; overflow: hidden; pointer-events: none; }
.vault-particle {
  position: absolute; width: 2px; height: 2px;
  background: rgba(201,168,76,.25); border-radius: 50%;
  animation: floatParticle linear infinite;
}
@keyframes floatParticle {
  0% { transform: translateY(100vh) translateX(0); opacity: 0; }
  10% { opacity: 1; } 90% { opacity: 1; }
  100% { transform: translateY(-10vh) translateX(40px); opacity: 0; }
}

.vault-glow {
  position: absolute; width: 500px; height: 500px;
  background: radial-gradient(circle, rgba(201,168,76,.12) 0%, transparent 70%);
  border-radius: 50%; pointer-events: none;
  animation: pulseGlow 4s ease-in-out infinite alternate;
}
@keyframes pulseGlow { from { transform: scale(1); opacity: .6; } to { transform: scale(1.15); opacity: 1; } }

.vault-door-wrap {
  position: relative; transform-style: preserve-3d;
  transform-origin: left center; transition: none;
}
.vault-door-wrap.swing { animation: swingOpen 1.6s cubic-bezier(.32,.94,.6,1) forwards; }
@keyframes swingOpen { 0% { transform: rotateY(0deg); } 100% { transform: rotateY(-115deg); } }

.vault-door {
  width: 280px; height: 280px; border-radius: 50%;
  background: linear-gradient(135deg, #2a3a50 0%, #1a2a3e 40%, #0f1f33 100%);
  border: 8px solid transparent; background-clip: padding-box;
  position: relative;
  box-shadow: 0 0 0 8px #C9A84C, 0 0 0 12px #a8893d, 0 0 0 14px rgba(201,168,76,.3),
    0 0 60px rgba(201,168,76,.15), inset 0 0 40px rgba(0,0,0,.5);
}
.vault-door::before {
  content: ''; position: absolute; inset: 18px; border-radius: 50%;
  border: 3px solid rgba(201,168,76,.25); box-shadow: inset 0 0 20px rgba(0,0,0,.3);
}
.vault-door::after {
  content: ''; position: absolute; inset: 40px; border-radius: 50%;
  border: 1px solid rgba(201,168,76,.12);
}

.vault-bolt {
  position: absolute; width: 14px; height: 14px;
  background: radial-gradient(circle at 35% 35%, #d4b862, #8a7033, #5a4820);
  border-radius: 50%;
  box-shadow: inset 0 1px 2px rgba(255,255,255,.3), 0 1px 3px rgba(0,0,0,.5);
}

.vault-spoke-wrap {
  position: absolute; inset: 60px;
  display: flex; align-items: center; justify-content: center;
  transition: transform .8s cubic-bezier(.4,0,.2,1);
}
.vault-spoke-wrap.rotate { transform: rotate(90deg); }
.vault-spoke {
  position: absolute;
  background: linear-gradient(to right, #8a7033, #C9A84C, #8a7033);
  border-radius: 4px; box-shadow: 0 1px 4px rgba(0,0,0,.4);
}
.vault-spoke.h { width: 100%; height: 6px; top: calc(50% - 3px); }
.vault-spoke.v { height: 100%; width: 6px; left: calc(50% - 3px); }
.vault-spoke.d1 { width: 100%; height: 5px; top: calc(50% - 2.5px); transform: rotate(45deg); }
.vault-spoke.d2 { width: 100%; height: 5px; top: calc(50% - 2.5px); transform: rotate(-45deg); }

.vault-hub {
  position: absolute; width: 60px; height: 60px;
  top: calc(50% - 30px); left: calc(50% - 30px); border-radius: 50%;
  background: radial-gradient(circle at 40% 35%, #d4b862, #C9A84C, #8a7033);
  box-shadow: 0 2px 8px rgba(0,0,0,.5), inset 0 1px 4px rgba(255,255,255,.2);
  z-index: 2; display: flex; align-items: center; justify-content: center;
}
.vault-hub-inner {
  width: 30px; height: 30px; border-radius: 50%;
  background: radial-gradient(circle at 40% 35%, #1a2a3e, #0f1f33);
  border: 2px solid rgba(201,168,76,.4);
}

.vault-brand {
  position: absolute; bottom: 55px; left: 0; right: 0;
  text-align: center; z-index: 3; pointer-events: none;
}
.vault-brand-tql { font-size: 28px; font-weight: 700; color: #C9A84C; letter-spacing: 6px; }
.vault-brand-sub { font-size: 11px; color: rgba(201,168,76,.5); letter-spacing: 3px; margin-top: 4px; }

.vault-input-area {
  margin-top: 40px; display: flex; flex-direction: column; align-items: center;
  z-index: 10; position: relative;
}
.vault-label { font-size: 11px; letter-spacing: 3px; color: rgba(255,255,255,.4); margin-bottom: 12px; text-transform: uppercase; }
.vault-code-wrap { display: flex; gap: 8px; margin-bottom: 16px; }
.vault-char {
  width: 38px; height: 48px; border-radius: 8px;
  background: rgba(255,255,255,.06); border: 1px solid rgba(201,168,76,.2);
  display: flex; align-items: center; justify-content: center;
  font-size: 20px; font-weight: 700; color: #C9A84C;
  transition: border-color .2s, background .2s;
}
.vault-char.active { border-color: #C9A84C; background: rgba(201,168,76,.08); }
.vault-char.filled { background: rgba(201,168,76,.12); }
.vault-hidden-input {
  position: absolute; opacity: 0; width: 1px; height: 1px;
}
.vault-error {
  font-size: 12px; color: #ef4444; min-height: 20px; margin-top: 4px;
  transition: opacity .2s;
}
.vault-hint { font-size: 11px; color: rgba(255,255,255,.25); margin-top: 12px; }

/* ======== APP LAYOUT ======== */
#app { display: none; height: 100vh; }
#app.visible { display: flex; }

/* Sidebar */
.sidebar {
  width: var(--sidebar-w); background: var(--surface);
  border-right: 1px solid var(--border); display: flex; flex-direction: column;
  flex-shrink: 0; overflow: hidden; z-index: 50;
}
.sidebar-header {
  padding: 16px 20px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 10px;
}
.sidebar-logo {
  width: 36px; height: 36px; border-radius: 8px;
  background: var(--navy); display: flex; align-items: center; justify-content: center;
  color: #fff; font-weight: 800; font-size: 11px; letter-spacing: 1px;
}
.sidebar-title { font-size: 14px; font-weight: 700; color: var(--navy); }
.sidebar-subtitle { font-size: 10px; color: var(--muted); letter-spacing: .5px; }

.sidebar-nav {
  flex: 1; overflow-y: auto; padding: 8px 0;
  scrollbar-width: thin; scrollbar-color: var(--border) transparent;
}
.nav-section { padding: 8px 16px 4px; font-size: 10px; font-weight: 700; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; }
.nav-item {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 16px; margin: 1px 8px; border-radius: var(--radius-sm);
  cursor: pointer; transition: all var(--transition); font-size: 12.5px;
  color: var(--text); font-weight: 500; text-decoration: none;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.nav-item:hover { background: var(--bg); }
.nav-item.active { background: var(--navy); color: #fff; font-weight: 600; }
.nav-item .nav-icon { font-size: 15px; flex-shrink: 0; width: 20px; text-align: center; }
.nav-item .nav-badge {
  margin-left: auto; font-size: 10px; font-weight: 600;
  background: var(--gold-lt); color: var(--gold); padding: 1px 6px;
  border-radius: 10px;
}
.nav-item.active .nav-badge { background: rgba(255,255,255,.2); color: #fff; }

/* Main Content */
.main-content {
  flex: 1; display: flex; flex-direction: column; overflow: hidden;
}
.topbar {
  height: var(--topbar-h); background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; padding: 0 24px; gap: 16px;
  flex-shrink: 0;
}
.topbar-title { font-size: 16px; font-weight: 700; color: var(--navy); }
.topbar-subtitle { font-size: 12px; color: var(--muted); }
.topbar-spacer { flex: 1; }
.topbar-badge {
  font-size: 10px; font-weight: 600; background: var(--gold-lt);
  color: var(--gold); padding: 3px 10px; border-radius: 12px;
}
.mobile-toggle {
  display: none; background: none; border: none; cursor: pointer;
  font-size: 20px; color: var(--navy); padding: 4px;
}

.content-area {
  flex: 1; overflow-y: auto; padding: 24px;
  scrollbar-width: thin; scrollbar-color: var(--border) transparent;
}

/* Panes */
.pane { display: none; }
.pane.active { display: block; }

/* Hero Cards */
.hero-grid {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 16px; margin-bottom: 24px;
}
.hero-card {
  background: var(--surface); border-radius: var(--radius);
  padding: 20px; border: 1px solid var(--border);
  box-shadow: var(--shadow-sm);
  transition: transform var(--transition), box-shadow var(--transition);
}
.hero-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-lg); }
.hero-card-label { font-size: 10px; font-weight: 600; color: var(--muted); letter-spacing: .5px; text-transform: uppercase; margin-bottom: 6px; }
.hero-card-value { font-size: 24px; font-weight: 800; color: var(--navy); }
.hero-card-sub { font-size: 11px; color: var(--muted); margin-top: 4px; }
.hero-card.gold { border-left: 3px solid var(--gold); }
.hero-card.green { border-left: 3px solid var(--green); }
.hero-card.navy { border-left: 3px solid var(--navy); }

/* Tables */
.table-wrap {
  background: var(--surface); border-radius: var(--radius);
  border: 1px solid var(--border); overflow-x: auto;
  box-shadow: var(--shadow-sm); margin-bottom: 24px;
}
.table-title {
  padding: 16px 20px; font-size: 14px; font-weight: 700;
  color: var(--navy); border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 8px;
}
.table-title .badge {
  font-size: 10px; font-weight: 600; background: var(--navy);
  color: #fff; padding: 2px 8px; border-radius: 10px;
}

table {
  width: 100%; border-collapse: collapse; font-size: 12px;
}
thead th {
  padding: 10px 12px; text-align: left; font-weight: 600;
  font-size: 10px; text-transform: uppercase; letter-spacing: .5px;
  color: var(--navy); background: var(--bg);
  border-bottom: 2px solid var(--border);
  position: sticky; top: 0; z-index: 5;
  white-space: nowrap;
}
tbody td {
  padding: 10px 12px; border-bottom: 1px solid var(--border);
  vertical-align: top;
}
tbody tr:last-child td { border-bottom: none; }
tbody tr:hover { background: rgba(13,59,102,.02); }

.cell-green { color: var(--green); font-weight: 600; }
.cell-red { color: var(--red); font-weight: 600; }
.cell-amber { color: var(--amber); font-weight: 600; }
.cell-muted { color: var(--muted); }
.cell-navy { color: var(--navy); font-weight: 600; }

.tag {
  display: inline-block; padding: 2px 7px; border-radius: 6px;
  font-size: 10px; font-weight: 600;
}
.tag-green { background: var(--green-lt); color: var(--green); }
.tag-red { background: var(--red-lt); color: var(--red); }
.tag-amber { background: var(--amber-lt); color: var(--amber); }
.tag-blue { background: var(--blue-lt); color: var(--navy); }
.tag-gold { background: var(--gold-lt); color: var(--gold); }

.notes-cell { font-size: 11px; color: var(--muted); max-width: 300px; line-height: 1.5; }
.str-proof { font-size: 11px; max-width: 280px; line-height: 1.5; }

/* Search Form */
.search-form {
  background: var(--surface); border-radius: var(--radius);
  border: 1px solid var(--border); padding: 24px; margin-bottom: 24px;
}
.search-grid {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 16px; margin-bottom: 16px;
}
.form-group label {
  display: block; font-size: 11px; font-weight: 600; color: var(--navy);
  margin-bottom: 4px; text-transform: uppercase; letter-spacing: .5px;
}
.form-group select, .form-group input {
  width: 100%; padding: 8px 12px; border: 1px solid var(--border);
  border-radius: var(--radius-sm); font-size: 13px; font-family: inherit;
  background: var(--bg); color: var(--text);
  transition: border-color var(--transition);
}
.form-group select:focus, .form-group input:focus {
  outline: none; border-color: var(--navy);
}
.btn-search {
  background: var(--navy); color: #fff; border: none;
  padding: 10px 24px; border-radius: var(--radius-sm);
  font-size: 13px; font-weight: 600; cursor: pointer;
  transition: background var(--transition);
}
.btn-search:hover { background: var(--navy-hover); }

.section-desc {
  font-size: 12px; color: var(--muted); margin-bottom: 16px;
  line-height: 1.6; max-width: 800px;
}

/* Mobile */
@media (max-width: 768px) {
  .sidebar { position: fixed; left: -280px; height: 100vh; z-index: 100; transition: left .3s; }
  .sidebar.open { left: 0; }
  .mobile-toggle { display: block; }
  .hero-grid { grid-template-columns: 1fr; }
  .content-area { padding: 16px; }
  .search-grid { grid-template-columns: 1fr; }
}

.mobile-overlay {
  display: none; position: fixed; inset: 0; background: rgba(0,0,0,.3);
  z-index: 99;
}
.mobile-overlay.show { display: block; }
</style>
</head>
<body>

<!-- ======== VAULT SCREEN ======== -->
<div id="vault-screen">
  <div class="vault-particles" id="vault-particles"></div>
  <div class="vault-glow"></div>
  <div class="vault-door-wrap" id="vault-door-wrap">
    <div class="vault-door">
      <div class="vault-bolt" style="top:12%;left:50%;transform:translateX(-50%)"></div>
      <div class="vault-bolt" style="bottom:12%;left:50%;transform:translateX(-50%)"></div>
      <div class="vault-bolt" style="left:12%;top:50%;transform:translateY(-50%)"></div>
      <div class="vault-bolt" style="right:12%;top:50%;transform:translateY(-50%)"></div>
      <div class="vault-bolt" style="top:18%;left:18%"></div>
      <div class="vault-bolt" style="top:18%;right:18%"></div>
      <div class="vault-bolt" style="bottom:18%;left:18%"></div>
      <div class="vault-bolt" style="bottom:18%;right:18%"></div>
      <div class="vault-spoke-wrap" id="vault-spokes">
        <div class="vault-spoke h"></div>
        <div class="vault-spoke v"></div>
        <div class="vault-spoke d1"></div>
        <div class="vault-spoke d2"></div>
        <div class="vault-hub"><div class="vault-hub-inner"></div></div>
      </div>
      <div class="vault-brand">
        <div class="vault-brand-tql">TQL</div>
        <div class="vault-brand-sub">MATRIX</div>
      </div>
    </div>
  </div>
  <div class="vault-input-area">
    <div class="vault-label">Enter Access Code</div>
    <div class="vault-code-wrap" id="vault-code-wrap"></div>
    <input class="vault-hidden-input" id="vault-input" type="text" autocomplete="off" maxlength="8" autofocus />
    <div class="vault-error" id="vault-error"></div>
    <div class="vault-hint">Authorized personnel only</div>
  </div>
</div>

<!-- ======== APP ======== -->
<div id="app">
  <div class="mobile-overlay" id="mobileOverlay"></div>
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-logo">TQL</div>
      <div>
        <div class="sidebar-title">TQL Matrix</div>
        <div class="sidebar-subtitle">Non-QM Intelligence</div>
      </div>
    </div>
    <nav class="sidebar-nav" id="sidebarNav"></nav>
  </aside>
  <main class="main-content">
    <header class="topbar">
      <button class="mobile-toggle" id="mobileToggle">&#9776;</button>
      <div>
        <div class="topbar-title" id="topbarTitle">Dashboard</div>
        <div class="topbar-subtitle" id="topbarSubtitle">Overview of all investor programs</div>
      </div>
      <div class="topbar-spacer"></div>
      <div class="topbar-badge">Last Updated: Mar 2026</div>
    </header>
    <div class="content-area" id="contentArea"></div>
  </main>
</div>

<script>
// ======== VAULT LOGIC ========
(function(){
  const CODE='TQLFAITH', LEN=CODE.length;
  const wrap=document.getElementById('vault-code-wrap');
  const inp=document.getElementById('vault-input');
  const err=document.getElementById('vault-error');
  const particles=document.getElementById('vault-particles');

  // particles
  for(let i=0;i<30;i++){
    const p=document.createElement('div');
    p.className='vault-particle';
    p.style.left=Math.random()*100+'%';
    p.style.animationDuration=(6+Math.random()*8)+'s';
    p.style.animationDelay=Math.random()*6+'s';
    particles.appendChild(p);
  }

  // char boxes
  for(let i=0;i<LEN;i++){
    const d=document.createElement('div');
    d.className='vault-char';
    d.id='vc'+i;
    wrap.appendChild(d);
  }

  wrap.addEventListener('click',()=>inp.focus());
  inp.addEventListener('input',function(){
    const v=this.value.toUpperCase().slice(0,LEN);
    this.value=v;
    for(let i=0;i<LEN;i++){
      const c=document.getElementById('vc'+i);
      c.textContent=v[i]||'';
      c.className='vault-char'+(i===v.length?' active':'')+(v[i]?' filled':'');
    }
    err.textContent='';
    if(v.length===LEN){
      if(v===CODE) openVault();
      else { err.textContent='Invalid code'; this.value=''; for(let i=0;i<LEN;i++){const c=document.getElementById('vc'+i);c.textContent='';c.className='vault-char'+(i===0?' active':'');} }
    }
  });
  inp.focus();

  function openVault(){
    const vs=document.getElementById('vault-screen');
    vs.classList.add('opening');
    document.getElementById('vault-spokes').classList.add('rotate');
    setTimeout(()=>document.getElementById('vault-door-wrap').classList.add('swing'),600);
    setTimeout(()=>{
      vs.style.opacity='0';
      vs.style.transition='opacity .5s';
      setTimeout(()=>{vs.classList.add('gone');document.getElementById('app').classList.add('visible');},500);
    },1800);
  }
})();

// ======== NAVIGATION ========
const NAV = [
  {id:'dashboard', icon:'\u2302', label:'Dashboard', sub:'Overview of all investor programs'},
  {id:'dscr-ltr', icon:'\uD83C\uDFE0', label:'DSCR Standard (LTR)', sub:'Long-term rental DSCR programs', section:'DSCR'},
  {id:'dscr-str', icon:'\u2708', label:'DSCR Short Term Rental', sub:'STR programs with proof requirements', section:'DSCR'},
  {id:'fulldoc-primary', icon:'\uD83D\uDC64', label:'Full/Alt Doc - Primary', sub:'Primary residence programs', section:'FULL DOC'},
  {id:'fulldoc-second', icon:'\uD83C\uDFD6', label:'Full/Alt Doc - 2nd Home', sub:'Second home programs', section:'FULL DOC'},
  {id:'fulldoc-invest', icon:'\uD83D\uDCBC', label:'Full/Alt Doc - Investment', sub:'Investment property programs', section:'FULL DOC'},
  {id:'fulldoc-str', icon:'\u2600', label:'Full/Alt Doc - STR', sub:'Full doc programs allowing STR', section:'FULL DOC'},
  {id:'fulldoc-rural', icon:'\uD83C\uDF3E', label:'Full/Alt Doc - Rural', sub:'Rural property programs', section:'SPECIALTY'},
  {id:'dscr-rural', icon:'\uD83C\uDF3F', label:'DSCR - Rural', sub:'DSCR rural property programs', section:'SPECIALTY'},
  {id:'str-rural', icon:'\uD83C\uDFD5', label:'STR on Rural', sub:'Combined STR + Rural programs', section:'SPECIALTY'},
  {id:'foreign-national', icon:'\uD83C\uDF0D', label:'Foreign National', sub:'FN-eligible programs', section:'SPECIALTY'},
  {id:'multi-unit', icon:'\uD83C\uDFE2', label:'5-8 Unit / Mixed Use', sub:'Multi-family DSCR programs', section:'SPECIALTY'},
  {id:'closed-second', icon:'\uD83D\uDD11', label:'Closed End 2nd / HELOC', sub:'Second lien programs', section:'SPECIALTY'},
  {id:'program-search', icon:'\uD83D\uDD0D', label:'Program Search', sub:'Interactive LTV lookup', section:'TOOLS'},
];

const sidebarNav = document.getElementById('sidebarNav');
let currentSection = '';
NAV.forEach(n => {
  if (n.section && n.section !== currentSection) {
    currentSection = n.section;
    const sec = document.createElement('div');
    sec.className = 'nav-section';
    sec.textContent = n.section;
    sidebarNav.appendChild(sec);
  }
  const div = document.createElement('div');
  div.className = 'nav-item' + (n.id === 'dashboard' ? ' active' : '');
  div.dataset.pane = n.id;
  div.innerHTML = '<span class="nav-icon">' + n.icon + '</span><span>' + n.label + '</span>';
  div.addEventListener('click', () => switchPane(n.id));
  sidebarNav.appendChild(div);
});

function switchPane(id) {
  document.querySelectorAll('.nav-item').forEach(el => el.classList.toggle('active', el.dataset.pane === id));
  document.querySelectorAll('.pane').forEach(el => el.classList.toggle('active', el.id === 'pane-' + id));
  const n = NAV.find(x => x.id === id);
  document.getElementById('topbarTitle').textContent = n.label;
  document.getElementById('topbarSubtitle').textContent = n.sub;
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('mobileOverlay').classList.remove('show');
}

document.getElementById('mobileToggle').addEventListener('click', () => {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('mobileOverlay').classList.toggle('show');
});
document.getElementById('mobileOverlay').addEventListener('click', () => {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('mobileOverlay').classList.remove('show');
});

function runSearch() {
  const loan = parseInt(document.getElementById('s-loan').value) || 0;
  const fico = parseInt(document.getElementById('s-fico').value) || 0;
  const prop = document.getElementById('s-prop').value;
  const occ = document.getElementById('s-occ').value;
  const cit = document.getElementById('s-cit').value;
  const ptype = document.getElementById('s-type').value;

  const results = [];
  PROGRAMS.forEach(p => {
    if (fico < p.fico) return;
    if (loan > p.maxLoan) return;
    if (!p.occ.includes(occ)) return;
    if (!p.prop.includes(prop)) return;
    if (!p.cit.includes(cit)) return;
    if (ptype !== 'Any' && !p.type.includes(ptype)) return;

    // Find best LTV
    let bestP = 0, bestRT = 0, bestCO = 0;
    const grids = [p.ltvP, p.ltvRT, p.ltvCO];
    grids.forEach((grid, gi) => {
      const ficos = Object.keys(grid).map(Number).sort((a,b)=>b-a);
      for (const f of ficos) {
        if (fico >= f) {
          const v = grid[f];
          if (gi === 0 && v > bestP) bestP = v;
          if (gi === 1 && v > bestRT) bestRT = v;
          if (gi === 2 && v > bestCO) bestCO = v;
          break;
        }
      }
    });

    if (bestP > 0 || bestRT > 0 || bestCO > 0) {
      results.push({inv: p.inv, prog: p.prog, type: p.type, ltvP: bestP, ltvRT: bestRT, ltvCO: bestCO});
    }
  });

  results.sort((a,b) => b.ltvP - a.ltvP);

  let html = '';
  if (results.length === 0) {
    html = '<div class="table-wrap"><div class="table-title">No matching programs found</div><div style="padding:20px;color:var(--muted)">Try adjusting your search criteria. Some common reasons for no results: FICO too low, loan amount exceeds limits, property type not eligible, or citizenship restriction.</div></div>';
  } else {
    let rows = '';
    results.forEach(r => {
      rows += '<tr>' + td(r.inv,'cell-navy') + td(r.prog) + td(tag(r.type, r.type==='DSCR'?'tag-gold':'tag-blue')) +
        td(r.ltvP ? r.ltvP + '%' : '--', r.ltvP >= 80 ? 'cell-green' : '') +
        td(r.ltvRT ? r.ltvRT + '%' : '--') +
        td(r.ltvCO ? r.ltvCO + '%' : '--') + '</tr>';
    });
    html = tableWrap('Search Results', results.length + ' programs matched',
      th('Investor') + th('Program') + th('Type') + th('Max LTV Purchase') + th('Max LTV R&T') + th('Max LTV C/O'), rows);
  }
  document.getElementById('search-results').innerHTML = html;
}
